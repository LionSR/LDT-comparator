name = "MIPStarREComparator"
version = "0.1.0"
defaultTargets = ["MIPStarREComparator", "Challenge", "Solution"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
maxSynthPendingDepth = 3

[[require]]
name = "MIPStarRE"
git = "https://github.com/LionSR/MIPStarRE.git"
# Pin to the audited library commit; bump together with a regenerated
# Challenge.lean (see the MIPStarRE repository's docs/comparator.md).
rev = "e57a7d26170b6fdd6940aed73405e59719fcf32a"

[[lean_lib]]
name = "Challenge"

[[lean_lib]]
name = "Solution"

[[lean_lib]]
name = "MIPStarREComparator"
